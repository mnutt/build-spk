name: Comment PR Loader Link
description: Create or update a PR comment with Sandstorm test loader and SPK links.

inputs:
  spk_http_url:
    description: Download URL of the SPK file.
    required: true
  package_id:
    description: Optional detected package ID.
    required: false
    default: ""
  loader_base_url:
    description: Base URL for your test app loader.
    required: false
    default: https://mnutt.github.io/sandstorm-test-app-loader/
  issue_number:
    description: PR number to comment on. Defaults to current context issue.
    required: false
    default: ""
  marker:
    description: Hidden marker used to find/update an existing comment.
    required: false
    default: "<!-- sandstorm-pr-test-loader -->"

outputs:
  loader_url:
    description: Final test loader URL used in the PR comment.
    value: ${{ steps.comment.outputs.loader_url }}

runs:
  using: composite
  steps:
    - name: Create or update PR comment
      id: comment
      uses: actions/github-script@v7
      env:
        SPK_HTTP_URL: ${{ inputs.spk_http_url }}
        PACKAGE_ID: ${{ inputs.package_id }}
        LOADER_BASE_URL: ${{ inputs.loader_base_url }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        MARKER: ${{ inputs.marker }}
      with:
        github-token: ${{ github.token }}
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const marker = process.env.MARKER;
          const spkUrl = process.env.SPK_HTTP_URL;
          const packageId = process.env.PACKAGE_ID || "";
          const issueNumber = Number(process.env.ISSUE_NUMBER || context.issue.number);
          const base = process.env.LOADER_BASE_URL.replace(/\/+$/, "");
          const loaderUrl = `${base}/?spk_url=${encodeURIComponent(spkUrl)}&package_id=${encodeURIComponent(packageId)}`;

          if (!issueNumber) {
            core.setFailed("No issue_number could be resolved from input or context.");
            return;
          }

          const body = [
            marker,
            "## Sandstorm Test Build",
            "",
            "Preview app install links for this PR:",
            "",
            `- [Open Test App Loader](${loaderUrl})`,
            `- [Download SPK](${spkUrl})`,
            `- Package ID: \`${packageId || "(not detected)"}\``,
          ].join("\n");

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number: issueNumber,
            per_page: 100,
          });
          const existing = comments.find((comment) => comment.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });
          }

          core.setOutput("loader_url", loaderUrl);
